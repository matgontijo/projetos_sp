# Blueprint do Render — deploy com um clique (New + > Blueprint no dashboard)
#
# ATENCAO aos planos:
# - Postgres "free" EXPIRA em 30 dias (dados apagados). Para uso real: basic-256mb.
# - Web service "free" hiberna apos 15 min sem trafego (1a requisicao demora ~1 min
#   e pode interromper sincronizacoes longas). Para uso real: starter.

databases:
  - name: custeio-db
    databaseName: custeio
    user: custeio
    plan: free # producao: basic-256mb
    region: virginia

services:
  # --- API (FastAPI) ---
  - type: web
    name: custeio-api
    runtime: python
    region: virginia
    plan: free # producao: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: custeio-db
          property: connectionString
      - key: APP_ENCRYPTION_KEY
        generateValue: true # segredo aleatorio; o app deriva a chave Fernet dele
      - key: CORS_ORIGINS
        value: https://custeio-app.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.8

  # --- Frontend (site estatico com proxy /api -> API) ---
  - type: web
    name: custeio-app
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      # Se o Render mudar o nome do servico da API (nome ja em uso), ajuste o
      # destino abaixo para a URL real exibida no dashboard.
      - type: rewrite
        source: /api/*
        destination: https://custeio-api.onrender.com/api/*
      # SPA: qualquer rota cai no index.html
      - type: rewrite
        source: /*
        destination: /index.html
